name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: hvac-linux-x86_64
            deb: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: hvac-linux-aarch64
            deb: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: hvac-macos-x86_64
            deb: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: hvac-macos-aarch64
            deb: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz hvac
          cd ../../..
          sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Install cargo-deb
        if: matrix.deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        if: matrix.deb
        run: |
          cargo deb --no-build --target ${{ matrix.target }}
          DEB_PATH=$(ls target/${{ matrix.target }}/debian/hvac_*.deb | head -n1)
          # Normalise filename to a predictable shape we can advertise in the README
          ARCH=$([ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ] && echo amd64 || echo arm64)
          VERSION="${GITHUB_REF_NAME#v}"
          NEW_NAME="hvac_${VERSION}_${ARCH}.deb"
          cp "$DEB_PATH" "$NEW_NAME"
          sha256sum "$NEW_NAME" > "$NEW_NAME.sha256"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

      - name: Upload .deb artifact
        if: matrix.deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-deb
          path: |
            hvac_*.deb
            hvac_*.deb.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hvac-linux-x86_64.tar.gz
            hvac-linux-x86_64.tar.gz.sha256
            hvac-linux-aarch64.tar.gz
            hvac-linux-aarch64.tar.gz.sha256
            hvac-macos-x86_64.tar.gz
            hvac-macos-x86_64.tar.gz.sha256
            hvac-macos-aarch64.tar.gz
            hvac-macos-aarch64.tar.gz.sha256
            hvac_${{ steps.meta.outputs.version }}_amd64.deb
            hvac_${{ steps.meta.outputs.version }}_amd64.deb.sha256
            hvac_${{ steps.meta.outputs.version }}_arm64.deb
            hvac_${{ steps.meta.outputs.version }}_arm64.deb.sha256

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "linux_x86_64=$(sha256sum hvac-linux-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$(sha256sum hvac-linux-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$(sha256sum hvac-macos-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_aarch64=$(sha256sum hvac-macos-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          cat > hvac.rb << FORMULA
          class Hvac < Formula
            desc "GPU-accelerated media transcoder (HEVC/h265 via NVENC, VAAPI, VideoToolbox)"
            homepage "https://github.com/JackDanger/hvac"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/JackDanger/hvac/releases/download/${TAG}/hvac-macos-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_aarch64 }}"
              else
                url "https://github.com/JackDanger/hvac/releases/download/${TAG}/hvac-macos-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_x86_64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/JackDanger/hvac/releases/download/${TAG}/hvac-linux-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_aarch64 }}"
              else
                url "https://github.com/JackDanger/hvac/releases/download/${TAG}/hvac-linux-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x86_64 }}"
              end
            end

            depends_on "ffmpeg"

            def install
              bin.install "hvac"
            end

            test do
              assert_match "hvac", shell_output("#{bin}/hvac --help")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' hvac.rb

          # Push to homebrew-tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/JackDanger/homebrew-tap.git"
          cp hvac.rb homebrew-tap/Formula/hvac.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hvac.rb
          git commit -m "Update hvac to ${VERSION}"
          git push

  aur:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump pkgver in PKGBUILD
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: hvac
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: jackdanger
          commit_email: jack@jackdanger.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release v${{ needs.publish.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          updpkgsums: true
