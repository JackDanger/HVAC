name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tdorr-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: tdorr-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tdorr-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tdorr-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz tdorr
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tdorr-linux-x86_64.tar.gz
            tdorr-linux-aarch64.tar.gz
            tdorr-macos-x86_64.tar.gz
            tdorr-macos-aarch64.tar.gz

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "linux_x86_64=$(sha256sum tdorr-linux-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$(sha256sum tdorr-linux-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$(sha256sum tdorr-macos-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_aarch64=$(sha256sum tdorr-macos-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          cat > tdorr.rb << FORMULA
          class Tdorr < Formula
            desc "GPU-accelerated media transcoder (HEVC/h265 via NVENC, VAAPI, VideoToolbox)"
            homepage "https://github.com/JackDanger/tdorr"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/JackDanger/tdorr/releases/download/${TAG}/tdorr-macos-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_aarch64 }}"
              else
                url "https://github.com/JackDanger/tdorr/releases/download/${TAG}/tdorr-macos-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_x86_64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/JackDanger/tdorr/releases/download/${TAG}/tdorr-linux-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_aarch64 }}"
              else
                url "https://github.com/JackDanger/tdorr/releases/download/${TAG}/tdorr-linux-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x86_64 }}"
              end
            end

            depends_on "ffmpeg"

            def install
              bin.install "tdorr"
            end

            test do
              assert_match "GPU-accelerated", shell_output("#{bin}/tdorr --help", 2)
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' tdorr.rb

          # Push to homebrew-tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/JackDanger/homebrew-tap.git"
          cp tdorr.rb homebrew-tap/Formula/tdorr.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tdorr.rb
          git commit -m "Update tdorr to ${VERSION}"
          git push
