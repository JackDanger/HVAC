name: Docker

# Build + publish multi-arch container images to GHCR.
#
# - main pushes        → ghcr.io/jackdanger/hvac:main + :sha-<short>
# - tag pushes (v*)    → ghcr.io/jackdanger/hvac:<version> + :latest
# - PRs                → build only (no push), so the Dockerfile doesn't
#                        rot silently.
#
# linux/amd64 + linux/arm64. The arm64 build matters: most modern Synology /
# QNAP boxes are aarch64, and so is Apple Silicon for the docker-on-Mac
# crowd. QEMU emulation is enough for Rust + apt and avoids juggling a
# self-hosted aarch64 runner.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only push on main/tag events. PRs build for syntax + portability
        # but don't get push credentials — keeps fork PRs honest.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR lowercases the org/owner segment regardless of how it's
          # written in the repo URL; using github.repository_owner directly
          # works as long as it's lowercase. Pinning to a literal here
          # avoids capitalisation drift between the repo (JackDanger/HVAC)
          # and the image (jackdanger/hvac).
          images: ghcr.io/jackdanger/hvac
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA build cache: writes to /tmp; reads from the same on cache
          # hits. First build is full, subsequent builds within the cache
          # TTL skip the apt + cargo layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
