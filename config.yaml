# hvac default configuration
# Target encoding: super high quality, highly compressed h265

target:
  codec: hevc
  # CQ mode (constant quality) - lower = better quality, higher = smaller files
  # NVENC CQ 28 ≈ x265 CRF 22 perceptually. Great quality, real space savings.
  quality: 28
  preset: slow
  # Max resolution - files at or below this are kept as-is
  max_width: 3840
  max_height: 2160
  # Max bitrate in kbps - 0 means no limit (let CQ decide)
  max_bitrate_kbps: 0
  # Container format
  container: mkv
  # Audio: copy by default (no re-encode)
  audio_codec: copy
  # Subtitle handling: copy all subtitle streams
  subtitle_codec: copy

# File extensions to consider for transcoding
media_extensions:
  - mkv
  - mp4
  - avi
  - ts
  - m2ts
  - mts
  - wmv
  - flv
  - mov
  - webm
  - vob
  - mpg
  - mpeg
  - ogv
  - 3gp
  - divx
  - iso
  - img

# Output directory for transcoded files (relative to source or absolute)
# If not set, files are placed next to originals with .transcoded suffix
# output_dir: /mnt/media/transcoded

# Skip disc images (.iso / .img) whose primary audio stream can't be chosen
# with confidence. Without this, hvac always picks something (usually correctly);
# with it, ambiguous discs are skipped so you can hand-investigate them.
# CLI override: --skip-ambiguous-audio (either source true → skip).
# skip_ambiguous_audio: false
