<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="120" rx="12" fill="url(#bg)"/>

  <!-- Film strip decoration -->
  <g opacity="0.3">
    <rect x="15" y="15" width="12" height="9" rx="1" fill="#ffd200">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="30" width="12" height="9" rx="1" fill="#ffd200">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="45" width="12" height="9" rx="1" fill="#ffd200">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="15" y="60" width="12" height="9" rx="1" fill="#ffd200">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="15" y="75" width="12" height="9" rx="1" fill="#ffd200">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="15" y="90" width="12" height="9" rx="1" fill="#ffd200">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
  </g>

  <!-- Main title -->
  <text x="200" y="58" text-anchor="middle" font-family="monospace, Courier" font-size="48" font-weight="bold" fill="url(#text-grad)" filter="url(#glow)">
    tdorr
  </text>

  <!-- Subtitle -->
  <text x="200" y="82" text-anchor="middle" font-family="monospace, Courier" font-size="13" fill="#aaa">
    media transcoding that I could figure out
  </text>

  <!-- Scanning line animation -->
  <line x1="40" y1="0" x2="40" y2="120" stroke="#ffd200" stroke-width="1" opacity="0.15">
    <animate attributeName="x1" values="40;380;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="40;380;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.25;0" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- GPU chip icon -->
  <g transform="translate(340, 20)" opacity="0.5">
    <rect x="0" y="0" width="24" height="24" rx="3" fill="none" stroke="#ffd200" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="6" y="6" width="12" height="12" rx="1" fill="#ffd200" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- pins -->
    <line x1="4" y1="-3" x2="4" y2="0" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="-3" x2="12" y2="0" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="-3" x2="20" y2="0" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
    <line x1="4" y1="24" x2="4" y2="27" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="24" x2="12" y2="27" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="24" x2="20" y2="27" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Progress bar animation -->
  <rect x="40" y="98" width="320" height="4" rx="2" fill="#1a1a2e"/>
  <rect x="40" y="98" width="0" height="4" rx="2" fill="url(#text-grad)">
    <animate attributeName="width" values="0;320;320;0" dur="6s" keyTimes="0;0.6;0.9;1" repeatCount="indefinite"/>
  </rect>
</svg>
