<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="sprockets" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect x="8" y="5" width="16" height="10" rx="2" fill="#1a0800"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5a2c08"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#080300"/>

  <!-- Film strips -->
  <rect x="0" y="0"   width="800" height="20" fill="#0e0500"/>
  <rect x="0" y="180" width="800" height="20" fill="#0e0500"/>
  <rect x="0" y="0"   width="800" height="20" fill="url(#sprockets)"/>
  <rect x="0" y="180" width="800" height="20" fill="url(#sprockets)"/>
  <line x1="0" y1="20"  x2="800" y2="20"  stroke="#2a1000" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#2a1000" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="60"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="46" font-weight="bold"
        fill="url(#amber)" filter="url(#glow)">slimarr</text>
  <text x="400" y="75"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="9.5" letter-spacing="4" fill="#3a1808">GPU-ACCELERATED H265 TRANSCODING</text>

  <!-- Source file -->
  <text x="124" y="92" text-anchor="middle"
        font-family="monospace" font-size="11" fill="#a04010">27 GB</text>
  <rect x="78" y="96" width="92" height="68" rx="3"
        fill="#180700" stroke="#7a3010" stroke-width="1.5"/>
  <text x="124" y="137" text-anchor="middle"
        font-family="monospace" font-size="10" fill="#6a2808">h264</text>

  <!-- Flow: source → GPU -->
  <line x1="170" y1="130" x2="342" y2="130"
        stroke="#5a2c08" stroke-width="1.5" stroke-dasharray="5 4"
        marker-end="url(#arrow)"/>

  <!-- GPU chip -->
  <rect x="350" y="104" width="100" height="56" rx="5"
        fill="#150600" stroke="#e06010" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="131" text-anchor="middle"
        font-family="monospace" font-size="13" font-weight="bold"
        fill="url(#amber)">GPU</text>
  <text x="400" y="147" text-anchor="middle"
        font-family="monospace" font-size="7.5" fill="#9a4820" letter-spacing="1">hevc_nvenc</text>

  <!-- Flow: GPU → output -->
  <line x1="450" y1="130" x2="590" y2="130"
        stroke="#5a2c08" stroke-width="1.5" stroke-dasharray="5 4"
        marker-end="url(#arrow)"/>

  <!-- Output file (~15% the width) -->
  <text x="605" y="92" text-anchor="middle"
        font-family="monospace" font-size="11" fill="#c87820">4 GB</text>
  <rect x="592" y="96" width="26" height="68" rx="3"
        fill="#180700" stroke="#c87820" stroke-width="1.5"/>
  <text x="605" y="137" text-anchor="middle"
        font-family="monospace" font-size="10" fill="#c87820">h265</text>

  <!-- Reduction -->
  <text x="660" y="130" text-anchor="middle"
        font-family="monospace" font-size="28" font-weight="bold"
        fill="url(#amber)" filter="url(#glow)">-85%</text>
  <text x="660" y="146" text-anchor="middle"
        font-family="monospace" font-size="8.5" fill="#3a1808" letter-spacing="1">avg savings</text>

  <!-- Tagline -->
  <text x="400" y="172" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="9" fill="#2e1206" letter-spacing="1">
    safe by default  ·  skips already-efficient files  ·  ISO / disc image support
  </text>
</svg>
