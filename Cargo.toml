[package]
name = "tdorr"
version = "0.1.0"
edition = "2021"
description = "A Rust media transcoder - Tdarr that doesn't suck"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
walkdir = "2"

[dev-dependencies]
tempfile = "3"
