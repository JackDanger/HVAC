[package]
name = "tdorr"
version = "5.1.2"
edition = "2021"
description = "GPU-accelerated media transcoding that I could figure out"
license = "MIT"
repository = "https://github.com/JackDanger/tdorr"
homepage = "https://github.com/JackDanger/tdorr"
readme = "README.md"
keywords = ["video", "transcode", "hevc", "h265", "ffmpeg"]
categories = ["command-line-utilities", "multimedia::video"]
exclude = ["tests/fixtures/*", "scripts/*", "packaging/*", "logo.svg"]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ctrlc = "3"
env_logger = "0.11"
indicatif = "0.17"
isomage = "0.1"
launchdarkly-server-sdk = { version = "3", default-features = false, features = ["hyper-rustls-native-roots", "event-compression"] }
libc = "0.2"
log = "0.4"
opentelemetry = { version = "0.27", default-features = false, features = ["trace"] }
opentelemetry-otlp = { version = "0.27", default-features = false, features = ["http-proto", "reqwest-blocking-client"] }
opentelemetry_sdk = { version = "0.27", default-features = false, features = ["trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[dev-dependencies]
tempfile = "3"
