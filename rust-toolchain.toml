# Reproducible toolchain for local builds.
#
# CI installs whatever `dtolnay/rust-toolchain@stable` resolves to at run
# time (currently 1.95+), which is the right thing for CI — we want to
# catch lint regressions on the current stable. This file is for
# contributors: rustup honours it on `cargo` invocations from within
# the repo so everyone has fmt/clippy that agree with the pre-commit hook.
#
# Bump `channel` alongside the `rust-version` field in Cargo.toml; the
# MSRV CI job verifies the older end of the supported range.
[toolchain]
channel = "stable"
components = ["clippy", "rustfmt", "llvm-tools-preview"]
profile = "minimal"
